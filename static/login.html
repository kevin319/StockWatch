<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Stock</title>
    <link href="/static/styles.css" rel="stylesheet">
    <script>
        (function(){var t=localStorage.getItem('sw-theme')||'light';document.documentElement.setAttribute('data-theme',t)})();
    </script>
    <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body class="login-body">
    <div class="login-page">
        <div class="login-glow"></div>
        <h1 class="login-title">My Stock</h1>
        <p class="login-subtitle">你的智慧選股助理</p>

        <div id="login-loading" class="login-loading">
            <div class="login-shimmer"></div>
        </div>

        <div id="login-error" class="login-error"></div>

        <div class="login-btn-wrap" id="buttonDiv"></div>
    </div>

    <script>
        function showLoading() {
            document.getElementById('login-loading').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('login-loading').style.display = 'none';
        }

        function showError(message) {
            const el = document.getElementById('login-error');
            el.style.display = 'block';
            el.textContent = message;
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function handleCredentialResponse(response) {
            showLoading();
            const token = response.credential;

            fetch('/verify_token?token=' + token, {
                method: 'GET',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
            })
            .then(r => {
                if (!r.ok) throw new Error('登入失敗');
                return r.json();
            })
            .then(data => {
                if (data.valid) {
                    sessionStorage.setItem('google_token', token);
                    sessionStorage.setItem('user_info', JSON.stringify({
                        email: data.email,
                        name: data.name,
                        picture: data.picture
                    }));
                    window.location.href = '/home';
                } else {
                    showError('登入驗證失敗，請重試');
                }
            })
            .catch(error => {
                console.error('驗證失敗:', error);
                showError('登入過程發生錯誤，請重試');
            })
            .finally(() => { hideLoading(); });
        }

        window.onload = function() {
            google.accounts.id.initialize({
                client_id: '167754876375-r3qvd9ai1e872mgqr6q7v2st90v8phb6.apps.googleusercontent.com',
                callback: handleCredentialResponse,
                auto_select: false,
                cancel_on_tap_outside: true
            });
            google.accounts.id.renderButton(
                document.getElementById('buttonDiv'),
                { type: 'standard', theme: 'filled_black', size: 'large', width: 280, shape: 'pill' }
            );
        };
    </script>
</body>
</html>
