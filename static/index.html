<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Stock</title>
    <link href="/static/styles.css" rel="stylesheet">
    <script>
        (function(){var t=localStorage.getItem('sw-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
        // 登入守衛：沒有憑證就同步導回登入頁（在 main.js 之前執行，避免先閃出 demo 畫面）
        if(!localStorage.getItem('access_token')){location.replace('/');}
    </script>
</head>
<body>

    <!-- Top Nav -->
    <header class="nav-top">
        <span class="nav-title">My Stock</span>
        <span class="nav-update" id="lastUpdateTime">--:--:--</span>
        <div class="nav-actions">
            <button class="nav-icon-btn" onclick="toggleChatWindow()" aria-label="AI 助理">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button class="nav-icon-btn" onclick="toggleSettingsPage()" aria-label="設置">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
            </button>
        </div>
    </header>

    <!-- Hero Card — 市場儀表板 -->
    <div class="hero-card">
        <div class="hero-head">
            <span class="hero-label">市場</span>
            <span class="hero-summary" id="heroSummary">—</span>
        </div>
        <div class="market-board" id="marketClock"></div>
    </div>

    <!-- Stock List -->
    <main class="page-content">
        <div class="v2-card" id="stockListCard">
            <div id="stockList"></div>
        </div>
    </main>

    <!-- Search Bar -->
    <div class="search-bar-wrap">
        <div class="search-field">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="搜尋股票代號或名稱...">
        </div>
        <div id="searchResults" class="search-results hidden"></div>
    </div>

    <!-- Settings Sheet -->
    <div id="settingsPage" class="sheet hidden">
        <div class="sheet-nav">
            <button class="sheet-back" onclick="toggleSettingsPage()">
                <svg width="10" height="18" viewBox="0 0 10 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1L1 9l8 8"/></svg>
                完成
            </button>
            <span class="sheet-title">設置</span>
        </div>

        <div class="settings-user-card">
            <img id="userAvatar" class="settings-avatar" src="" alt="">
            <div class="settings-user-info">
                <div class="user-name" id="userName"></div>
                <div class="user-email" id="userEmail"></div>
            </div>
            <button class="pill-btn pill-btn-danger" onclick="logout()">登出</button>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">外觀</div>
            <div class="v2-card">
                <div class="settings-row-simple">
                    <span class="settings-row-label">主題</span>
                    <div class="segmented-control" id="themeToggle">
                        <button class="seg-btn" data-theme="light" onclick="setTheme('light')">淺色</button>
                        <button class="seg-btn active" data-theme="dark" onclick="setTheme('dark')">深色</button>
                        <div class="seg-thumb"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">自選股</div>
            <div class="v2-card">
                <div id="settingsStockList"></div>
            </div>
        </div>
        <div class="settings-bottom-pad"></div>
    </div>

    <!-- Chat Sheet -->
    <div id="chatWindow" class="sheet hidden">
        <div class="chat-sheet">
            <div class="sheet-nav">
                <span class="sheet-title">AI 助理</span>
                <button class="nav-icon-btn" onclick="toggleChatWindow()" style="margin-left:auto">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-bar">
                <input type="text" id="messageInput" class="chat-input"
                       placeholder="輸入訊息..."
                       onkeypress="if(event.key==='Enter')sendMessage()">
                <button class="chat-send-btn" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        marked.setOptions({ breaks: true, gfm: true });

        window.onload = function() {
            const token = localStorage.getItem('access_token');
            if (!token) { window.location.href = '/'; return; }

            const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
            if (userInfo.name) {
                document.getElementById('userName').textContent = userInfo.name;
                document.getElementById('userEmail').textContent = userInfo.email;
                const avatarImg = document.getElementById('userAvatar');
                if (userInfo.picture) {
                    avatarImg.onerror = function() {
                        this.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(userInfo.name) + '&background=0071e3&color=fff&bold=true&size=96';
                    };
                    avatarImg.src = userInfo.picture;
                } else {
                    avatarImg.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(userInfo.name) + '&background=0071e3&color=fff&bold=true&size=96';
                }
            }

            fetch('/verify_session?token=' + token, {
                method: 'GET',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
            })
            .then(r => { if (!r.ok) throw new Error('Session 驗證失敗'); return r.json(); })
            .then(data => { if (!data.valid) logout(); })
            .catch(() => logout());
        };

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_info');
            window.location.href = '/';
        }
    </script>
    <script src="/static/main.js"></script>
</body>
</html>
